[tools.exec]
name = "exec"
description = "Execute shell commands and return output. Default timeout is 60 seconds, output over 10000 characters will be truncated. Includes safety checks, dangerous commands are prohibited."
hint = "Prefer filesystem tools (read_file/write_file/edit_file) for file operations. Use exec only for batch operations, complex text processing, or system commands. Suitable for: batch file operations, complex text processing, system info queries, scenarios requiring pipes or redirects."
param_command = "Shell command to execute"
param_working_dir = "Optional working directory, defaults to current directory"

[tools.web_search]
name = "web_search"
description = "Search the internet for latest information. Returns 5 results by default, supports Tavily, Brave Search, and DuckDuckGo with automatic fallback."
hint = "Use when you need latest information, verify facts, or get external resources. Search queries should be concise and clear. For detailed content, first use web_search to get URLs, then use web_extract to get full content."
param_query = "Search query, should be concise and clear"
param_max_results = "Maximum number of results to return, default is 5"

[tools.web_extract]
name = "web_extract"
description = "Extract content from web page URLs. Supports batch extraction (recommend no more than 5 URLs at a time). Content over 5000 characters will be truncated."
hint = "Best practice: First use web_search to get relevant URLs, then use web_extract to get detailed content. Suitable for scenarios requiring reading full web page content."
param_urls = "List of URLs to extract content from, supports batch (recommend no more than 5 at a time)"
param_extract_depth = "Extraction depth: basic (fast extraction) or advanced (deep extraction, default)"

[tools.remember]
name = "remember"
description = "Save important information to memory for later recall. Memories persist across sessions."
hint = "Must call this tool when users share important info (name, preferences, contacts, schedule, etc.). Don't just say 'I'll remember', call the tool immediately."
param_content = "Information to remember, should be concise and clear"
param_category = "Category label: personal (personal info), preference (preferences), work (work-related), contact (contact info), goal (goals), schedule (schedule), general (general). Choose the most appropriate category based on content type."
param_importance = "Importance score 0.0-1.0, default 0.5. Key info (name, important preferences) use 0.8-1.0, general info use 0.3-0.7, temporary info use 0.1-0.3"
success = "Information saved to memory"

[tools.recall]
name = "recall"
description = "Search and retrieve information from memory. Supports hybrid retrieval strategy based on query type (Weighted RRF)."
hint = "Must call this tool first when users ask about their own information. Choose query_type based on the nature of the query: factual for specific facts, conceptual for abstract concepts, complex for multi-faceted queries, ambiguous for unclear queries, keyword_only for exact matches, semantic_only for semantic exploration."
param_query = "Search query, can be keywords or natural language description"
param_category = "Filter by category (optional), such as personal, work, preference, etc. If not specified, searches all categories."
param_top_k = "Maximum number of results to return, default 5. Increase to get more relevant memories, decrease to get most relevant results."
param_query_type = "Query type: keyword_only (1.0/0.0), semantic_only (0.0/1.0), factual (0.8/0.2), conceptual (0.2/0.8), complex (0.5/0.5), ambiguous (0.3/0.7)"
param_similarity_threshold = "Similarity threshold 0.0-1.0, default 0.5. Used to filter semantically unrelated results. Increase (e.g., 0.7) when getting irrelevant results, decrease (e.g., 0.3) when getting too few results"
not_found = "No matching memories found"

[tools.forget]
name = "forget"
description = "Remove specified information from memory. Deletion is permanent and cannot be undone. Supports partial matching, e.g., entering 'email' will delete all memories containing 'email'."
hint = "Call this tool when users explicitly request to forget, delete, or clear certain information. Cannot be undone after deletion, use with caution."
param_pattern = "Content pattern to remove, supports partial matching. E.g., entering 'email' will delete all memories containing 'email'."
success = "Memory entries removed"

