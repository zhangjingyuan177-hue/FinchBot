configured_servers = "You have the following MCP servers configured, providing additional tool capabilities:"
available_tools = "Available MCP Tools"
tools_intro = "The following tools are from MCP servers, extending your capabilities:"
how_to_add = "How to Add MCP Servers"
add_steps = """Users can add MCP servers by:
